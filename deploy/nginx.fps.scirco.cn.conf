server {
  listen 80;
  server_name fps.scirco.cn;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name fps.scirco.cn;

  # SSL（宝塔自动申请，路径以实际为准）
  ssl_certificate     /www/server/panel/vhost/cert/fps.scirco.cn/fullchain.pem;
  ssl_certificate_key /www/server/panel/vhost/cert/fps.scirco.cn/privkey.pem;

  # 静态文件兜底（如果 PHP 挂了还能看个首页）
  root /www/wwwroot/fps.scirco.cn/client/dist;
  index index.html;

  # 反代到 PHP Workerman（单端口同时处理 HTTP + WebSocket）
  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # 静态缓存
  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    try_files $uri =404;
  }
}
